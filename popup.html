<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PixPluck</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="34" height="34" role="img" aria-label="PixPluck logo">
              <rect x="2" y="2" width="44" height="44" rx="11" fill="#05a081" />
              <circle cx="34.5" cy="14.5" r="2.4" fill="#ffffff" opacity="0.9" />
              <rect x="21.4" y="12" width="5.2" height="15" rx="2.6" fill="#ffffff" />
              <path d="M16 24 L32 24 L24 34 Z" fill="#ffffff" />
              <rect x="15" y="36.4" width="18" height="3.6" rx="1.8" fill="#ffffff" opacity="0.92" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>PixPluck</h1>
            <p>Pexels media grabber</p>
          </div>
        </div>
        <button id="themeToggle" class="icon-btn theme-toggle" type="button" aria-label="Toggle light and dark theme" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="4.2" fill="currentColor" />
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2.5" x2="12" y2="5.2" />
              <line x1="12" y1="18.8" x2="12" y2="21.5" />
              <line x1="2.5" y1="12" x2="5.2" y2="12" />
              <line x1="18.8" y1="12" x2="21.5" y2="12" />
              <line x1="5.2" y1="5.2" x2="7.1" y2="7.1" />
              <line x1="16.9" y1="16.9" x2="18.8" y2="18.8" />
              <line x1="5.2" y1="18.8" x2="7.1" y2="16.9" />
              <line x1="16.9" y1="7.1" x2="18.8" y2="5.2" />
            </g>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M20 14.5A8 8 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5Z" fill="currentColor" />
          </svg>
        </button>
      </header>

      <nav class="tabs" role="tablist" aria-label="Media type">
        <button class="tab is-active" data-tab="video" role="tab" aria-selected="true" type="button">Videos</button>
        <button class="tab" data-tab="image" role="tab" aria-selected="false" type="button">Images</button>
        <span class="tab-indicator" aria-hidden="true"></span>
      </nav>

      <section class="toolbar">
        <button id="fetchBtn" class="btn btn-primary" type="button">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M12 3v10m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span id="fetchLabel">Fetch videos</span>
        </button>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="2" />
            <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <input id="searchInput" class="search" type="search" placeholder="Filter by id or size" aria-label="Filter results" />
        </div>
      </section>

      <section class="subbar" id="subbar" hidden>
        <div class="subbar-row">
          <label class="select-all">
            <input type="checkbox" id="selectAll" />
            <span>Select all</span>
          </label>
          <span id="countChip" class="chip">0 found</span>
        </div>
        <div class="bulk-actions">
          <button id="downloadSelected" class="btn btn-ghost btn-sm" type="button" disabled>Download selected</button>
          <button id="downloadAll" class="btn btn-solid btn-sm" type="button">Download all</button>
        </div>
      </section>

      <main id="results" class="results" aria-live="polite">
        <div class="state state-intro" id="introState">
          <div class="state-art" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="58" height="58">
              <rect x="8" y="14" width="34" height="26" rx="4" fill="none" stroke="currentColor" stroke-width="2.5" />
              <circle cx="17" cy="23" r="3" fill="currentColor" />
              <path d="M12 39 L23 28 L31 35 L38 30 L42 34" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M46 30v12m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <h2>Ready when you are</h2>
          <p>Open a Pexels page, then hit <strong>Fetch videos</strong> to pull the media into view. Scroll the page first to load more results.</p>
        </div>
      </main>

      <div id="progress" class="progress" hidden>
        <div class="progress-info">
          <span id="progressText">Downloading</span>
          <span id="progressCount">0 / 0</span>
          <button id="cancelBtn" class="cancel-btn" type="button" title="Stop starting new downloads">Cancel</button>
        </div>
        <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      </div>

      <footer class="app-footer">
        <span>Built by
          <a href="https://www.abdullahawais.com" target="_blank" rel="noreferrer noopener">Muhammad Abdullah Awais</a>
        </span>
        <span class="footer-role">Full Stack Developer</span>
      </footer>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="scraper.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
